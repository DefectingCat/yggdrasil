name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  RUSTUP_UPDATE_ROOT: https://mirrors.tuna.tsinghua.edu.cn/rustup/rustup
  RUSTUP_DIST_SERVER: https://mirrors.tuna.tsinghua.edu.cn/rustup

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin https://git.rua.plus/${{ github.repository }}.git
          git fetch --depth 1 origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      - name: Configure Cargo mirror
        run: |
          mkdir -p "$HOME/.cargo"
          printf '%s\n' '[source.crates-io]' "replace-with = 'rsproxy'" '' "[source.rsproxy]" 'registry = "sparse+https://rsproxy.cn/index/"' > "$HOME/.cargo/config.toml"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Node.js
        run: |
          apt-get update
          apt-get install -y nodejs npm

      - name: Install Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Install Tailwind CSS CLI
        run: npm install -g tailwindcss

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Dioxus check
        run: dx check

  build:
    runs-on: ubuntu-latest
    needs: check
    env:
      RUSTUP_UPDATE_ROOT: https://mirrors.tuna.tsinghua.edu.cn/rustup/rustup
      RUSTUP_DIST_SERVER: https://mirrors.tuna.tsinghua.edu.cn/rustup
    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin https://git.rua.plus/${{ github.repository }}.git
          git fetch --depth 1 origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      - name: Configure Cargo mirror
        run: |
          mkdir -p "$HOME/.cargo"
          printf '%s\n' '[source.crates-io]' "replace-with = 'rsproxy'" '' "[source.rsproxy]" 'registry = "sparse+https://rsproxy.cn/index/"' > "$HOME/.cargo/config.toml"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Node.js
        run: |
          apt-get update
          apt-get install -y nodejs npm

      - name: Install Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Install Tailwind CSS CLI
        run: npm install -g tailwindcss

      - name: Build release
        run: make build
